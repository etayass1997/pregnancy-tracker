<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות — בטן מלאה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💕</div>
        <h1 class="auth-title">בטן מלאה</h1>
        <p class="auth-subtitle">מעקב הריון אישי ואינטליגנטי</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>שם משתמש</label>
                <input type="text" name="username" placeholder="הכניסי שם משתמש" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" name="password" placeholder="הכניסי סיסמה" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">כניסה</button>
        </form>

        <p class="auth-link">
            עוד לא נרשמת? <a href="{{ url_for('register') }}">הצטרפי עכשיו</a>
        </p>
    </div>
</div>
</body>
</html>
