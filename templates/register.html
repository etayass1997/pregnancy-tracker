<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה — בטן מלאה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="max-width:460px">
        <div class="auth-logo">🌸</div>
        <h1 class="auth-title">הצטרפי אלינו</h1>
        <p class="auth-subtitle">מלאי את הפרטים ונתחיל את המסע יחד</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>השם שלך 💕</label>
                <input type="text" name="display_name" placeholder="לדוגמה: שרה" required>
            </div>
            <div class="form-group">
                <label>שם משתמש (לכניסה)</label>
                <input type="text" name="username" placeholder="באנגלית, ללא רווחים" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" name="password" placeholder="לפחות 6 תווים" minlength="6" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>מין התינוק 👶</label>
                <div class="gender-selector">
                    <label class="gender-option">
                        <input type="radio" name="baby_gender" value="boy">
                        <span class="gender-btn">👦 בן</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="baby_gender" value="girl">
                        <span class="gender-btn">👧 בת</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="baby_gender" value="unknown" checked>
                        <span class="gender-btn">🤷 עדיין לא יודעת</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>באיזה שבוע הריון את? 🤰</label>
                <div class="week-selector">
                    <select name="current_week" required id="weekSelect" onchange="updateWeekDisplay(this.value)">
                        {% for w in range(1, 41) %}
                        <option value="{{ w }}" {% if w == 12 %}selected{% endif %}>שבוע {{ w }}</option>
                        {% endfor %}
                    </select>
                    <div class="week-hint" id="weekHint">
                        טרימסטר ראשון — סוף השליש הראשון 🌱
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">בואי נתחיל! 🌸</button>
        </form>

        <p class="auth-link">
            כבר יש לי חשבון. <a href="{{ url_for('login') }}">כניסה</a>
        </p>
    </div>
</div>

<script>
const hints = {

    2: "טרימסטר ראשון — ההפריה בדרך 🌱",

    4: "טרימסטר ראשון — ייתכן שהטסט חיובי! 🌸",
    5: "טרימסטר ראשון — הלב מתחיל לפעם! 💓",
    6: "טרימסטר ראשון — אחד השבועות הקשים 😅",

    11: "טרימסטר ראשון — כמעט סוף השליש 💪",

    17: "טרימסטר שני — תנועות ברורות יותר 🥰",
    18: "טרימסטר שני — שבוע האולטרסאונד האנטומי! 🔬",

function updateWeekDisplay(week) {
    const hint = document.getElementById('weekHint');
    hint.textContent = hints[week] || '';
}

document.addEventListener('DOMContentLoaded', function() {
    updateWeekDisplay(12);
});
</script>
</body>
</html>
